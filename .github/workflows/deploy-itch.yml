jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [linux, web]
    steps:
      - uses: actions/checkout@v7
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ matrix.target }}-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/Cargo.lock') }}
          restore-prefixes-first-match: nix-${{ matrix.target }}-${{ runner.os }}-

      - name: Build (linux)
        if: matrix.target == 'linux'
        run: nix develop --command cargo build --release

      - name: Build (web)
        if: matrix.target == 'web'
        run: |
          nix develop --command cargo build --release --target wasm32-unknown-unknown
          nix develop --command wasm-bindgen --target web --out-dir web/ target/wasm32-unknown-unknown/release/template.wasm
          cp -r assets web/

      - name: Install butler
        run: |
          curl -L -o butler.zip https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default
          unzip -o butler.zip
          chmod +x butler

      - name: Push to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          if [ "${{ matrix.target }}" = "linux" ]; then
            ./butler push target/release/template ${{ vars.ITCH_TARGET }}:linux
          else
            ./butler push web ${{ vars.ITCH_TARGET }}:web
          fi
