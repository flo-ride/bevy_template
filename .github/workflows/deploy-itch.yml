name: Deploy to itch.io

on:
  push:
    tags:
      - "v*"

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Nix Cache
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-fmt-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/Cargo.lock') }}
          restore-prefixes-first-match: nix-fmt-${{ runner.os }}-
          
      - name: Building the linux target 
        run: nix develop --command cargo build --release 

      - name: Install butler
        run: |
          curl -L -o butler.zip https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default
          unzip butler.zip
          chmod +x butler

      - name: Push itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          ./butler push \
            target/release/template \
            mrvym/draft-gmtk-2026:linux

  build-web:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Nix Cache
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-fmt-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/Cargo.lock') }}
          restore-prefixes-first-match: nix-fmt-${{ runner.os }}-
          
      - name: Building the wasm target 
        run: nix develop --command cargo build --release --target wasm32-unknown-unknown

      - name: Build wasm package
        run: |
          nix develop --command wasm-bindgen \
            --target web \
            --out-dir web/ \
            target/wasm32-unknown-unknown/release/template.wasm

      - name: Prepare itch.io package
        run: |
          mkdir -p web
          cp wasm/* web/
          cd web/

      - name: Install butler
        run: |
          curl -L -o butler.zip https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default
          unzip butler.zip
          chmod +x butler

      - name: Push itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          ./butler push \
            web \
            mrvym/draft-gmtk-2026:web
