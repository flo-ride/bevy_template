name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  NIX_CONFIG: "experimental-features = nix-command flakes"

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Nix Cache
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-fmt-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/Cargo.lock') }}
          restore-prefixes-first-match: nix-fmt-${{ runner.os }}-

      - name: Check formatting
        run: nix develop --command cargo fmt --all -- --check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Nix Cache
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-lint-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/Cargo.lock') }}
          restore-prefixes-first-match: nix-lint-${{ runner.os }}-

      - name: Expose devShell PATH for rust-cache
        run: nix develop --command bash -c 'echo "$PATH"' | tr ':' '\n' >> "$GITHUB_PATH"

      - uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: nix shell nixpkgs#cargo-hack -c nix develop --command cargo hack clippy --each-feature -- -D warnings

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Nix Cache
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-build-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/Cargo.lock') }}
          restore-prefixes-first-match: nix-build-${{ runner.os }}-

      - name: Expose devShell PATH for rust-cache
        run: nix develop --command bash -c 'echo "$PATH"' | tr ':' '\n' >> "$GITHUB_PATH"

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: nix shell nixpkgs#cargo-hack -c nix develop --command cargo hack check --each-feature
