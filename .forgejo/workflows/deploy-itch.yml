name: Deploy to itch.io

on:
  push:
    branches:
      - master
    tags:
      - "v*"

env:
  BINARY: template
  ITCH_TARGET: ${{ vars.ITCH_TARGET }}

jobs:
  configure:
    runs-on: ubuntu-latest
    outputs:
      channel: ${{ steps.meta.outputs.channel }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Resolve deployment channel and version
        id: meta
        env:
          REF: ${{ github.ref }}
          SHA: ${{ github.sha }}
        run: |
          if [[ "$REF" == "refs/heads/master" ]]; then
            echo "channel=dev" >> "$GITHUB_OUTPUT"
            echo "version=dev-${SHA:0:7}" >> "$GITHUB_OUTPUT"
          elif [[ "$REF" == refs/tags/v* ]]; then
            echo "channel=stable" >> "$GITHUB_OUTPUT"
            echo "version=${REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "Unsupported ref: $REF" >&2
            exit 1
          fi

  build-linux:
    needs: configure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            mold \
            pkg-config \
            libasound2-dev \
            libudev-dev \
            libwayland-dev \
            libx11-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev

      - uses: Swatinem/rust-cache@v2

      - name: Build Linux binary
        run: cargo build --release --target x86_64-unknown-linux-gnu --features 2d

      - name: Package Linux build
        run: |
          mkdir -p dist/linux
          cp "target/x86_64-unknown-linux-gnu/release/${BINARY}" dist/linux/
          cp -r assets dist/linux/ 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: dist/linux
          retention-days: 1

  build-wasm:
    needs: configure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-bindgen-cli
        run: |
          version="$(cargo metadata --format-version 1 | jq -r '.packages[] | select(.name=="wasm-bindgen") | .version')"
          cargo install wasm-bindgen-cli --force --version "$version"

      - name: Build WASM binary
        run: cargo build --profile wasm-release --target wasm32-unknown-unknown --features 2d

      - name: Package web build
        run: |
          mkdir -p dist/web
          wasm-bindgen \
            --no-typescript \
            --out-name "${BINARY}" \
            --out-dir dist/web \
            --target web \
            "target/wasm32-unknown-unknown/wasm-release/${BINARY}.wasm"
          cp wasm/index.html wasm/restart-audio-context.js dist/web/
          cp -r assets dist/web/ 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: web
          path: dist/web
          retention-days: 1

  deploy:
    needs: [configure, build-linux, build-wasm]
    runs-on: ubuntu-latest
    steps:
      - name: Verify itch.io target
        run: |
          if [[ -z "${ITCH_TARGET}" ]]; then
            echo "Set the ITCH_TARGET repository variable to <username>/<game>." >&2
            exit 1
          fi

      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Install butler
        run: |
          curl -fsSL -o butler.zip "https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default"
          unzip butler.zip
          chmod +x butler
          ./butler -V

      - name: Push builds to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
          CHANNEL: ${{ needs.configure.outputs.channel }}
          VERSION: ${{ needs.configure.outputs.version }}
        run: |
          ./butler push \
            --fix-permissions \
            --userversion="$VERSION" \
            dist/web \
            "${ITCH_TARGET}:${CHANNEL}"

          ./butler push \
            --fix-permissions \
            --userversion="$VERSION" \
            dist/linux \
            "${ITCH_TARGET}:${CHANNEL}-linux"
